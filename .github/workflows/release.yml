name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
          - os: windows-latest
            rid: win-x64
            ext: '.exe'
          - os: macos-latest
            rid: osx-arm64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Publish AOT
        run: >
          dotnet publish src/CodePorting.Api.Cli
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -p:DebugType=none
          -o ./artifacts/raw

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "codeporting-api-cli-${{ matrix.rid }}"
          Compress-Archive `
            -Path "./artifacts/raw/codeporting-api-cli${{ matrix.ext }}" `
            -DestinationPath "./artifacts/$archiveName.zip"

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARCHIVE_NAME="codeporting-api-cli-${{ matrix.rid }}"
          cd ./artifacts/raw
          zip "../${ARCHIVE_NAME}.zip" "codeporting-api-cli${{ matrix.ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.rid }}
          path: ./artifacts/codeporting-api-cli-${{ matrix.rid }}.zip
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}