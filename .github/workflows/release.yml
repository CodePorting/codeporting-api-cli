name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
          - os: windows-latest
            rid: win-x64
            ext: '.exe'
          - os: macos-latest
            rid: osx-arm64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Set artifact name
        shell: bash
        run: echo "ARTIFACT_NAME=codeporting-api-cli-${{ matrix.rid }}${{ matrix.ext }}" >> $GITHUB_ENV

      - name: Publish AOT
        run: >
          dotnet publish src/CodePorting.Api.Cli
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -p:DebugType=none
          -o ./artifacts

      - name: Rename artifact
        shell: bash
        run: |
          mv "./artifacts/codeporting-api-cli${{ matrix.ext }}" "./artifacts/${{ env.ARTIFACT_NAME }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/${{ env.ARTIFACT_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}